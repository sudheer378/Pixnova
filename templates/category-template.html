<!DOCTYPE html>
<html lang="en" class="">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{CATEGORY_TITLE}} | Pixaroid</title>
  <meta name="description" content="{{CATEGORY_DESCRIPTION}}" />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="https://pixaroid.vercel.app/tools/{{CATEGORY_SLUG}}/" />
  <meta property="og:type"        content="website" />
  <meta property="og:site_name"   content="Pixaroid" />
  <meta property="og:title"       content="{{CATEGORY_OG_TITLE}}" />
  <meta property="og:description" content="{{CATEGORY_OG_DESCRIPTION}}" />
  <meta property="og:url"         content="https://pixaroid.vercel.app/tools/{{CATEGORY_SLUG}}/" />
  <meta property="og:image"       content="https://pixaroid.vercel.app/assets/images/og-default.png" />
  <meta name="twitter:card"        content="summary_large_image" />
  <meta name="twitter:site"        content="@pixaroidapp" />
  <meta name="twitter:title"       content="{{CATEGORY_OG_TITLE}}" />
  <meta name="twitter:description" content="{{CATEGORY_OG_DESCRIPTION}}" />
  <meta name="twitter:image"       content="https://pixaroid.vercel.app/assets/images/og-default.png" />
  <link rel="icon"     href="/assets/svg/favicon.svg" type="image/svg+xml" />
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#4F46E5" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/output.css" />
  <link rel="stylesheet" href="/css/animations.css" />
  <script type="application/ld+json">{{CATEGORY_SCHEMA_BREADCRUMB}}</script>
  <script type="application/ld+json">{{CATEGORY_SCHEMA_ITEMLIST}}</script>
</head>
<body class="bg-[var(--bg)] text-[var(--text)]">

  <!-- Navbar (same as homepage — injected by build) -->
  <header id="navbar" data-component="navbar"></header>

  <!-- Category Hero -->
  <section id="category-hero"
           data-category="{{CATEGORY_SLUG}}"
           data-color="{{CATEGORY_COLOR}}"
           style="background:{{CATEGORY_COLOR_BG}};border-bottom:1px solid var(--border);padding:3.5rem 1.5rem 2.5rem;">
    <div style="max-width:1200px;margin:0 auto;">
      <nav style="font-size:.8125rem;color:var(--muted);margin-bottom:1.5rem;display:flex;gap:.5rem;">
        <a href="/">Home</a><span>›</span><span>{{CATEGORY_LABEL}}</span>
      </nav>
      <div style="display:inline-flex;align-items:center;gap:.375rem;padding:.25rem .75rem;border-radius:999px;font-size:.75rem;font-weight:600;margin-bottom:1rem;background:{{CATEGORY_COLOR_BG}};color:{{CATEGORY_COLOR}};border:1px solid {{CATEGORY_COLOR}}30;">
        {{CATEGORY_TOOL_COUNT}} Tools
      </div>
      <h1 style="font-family:'Poppins',sans-serif;font-size:clamp(1.75rem,3.5vw,2.5rem);font-weight:800;margin-bottom:.75rem;">{{CATEGORY_HEADLINE}}</h1>
      <p style="font-size:1.0625rem;color:var(--muted);max-width:560px;line-height:1.7;">{{CATEGORY_SUBHEADLINE}}</p>
    </div>
  </section>

  <!-- Tool Grid -->
  <main id="tool-grid" style="max-width:1200px;margin:0 auto;padding:2.5rem 1.5rem 5rem;">
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:1rem;">
      {{TOOL_CARDS}}
    </div>
  </main>

  <!-- Footer (same as homepage — injected by build) -->
  <footer id="footer" data-component="footer"></footer>

  <script type="module" src="/js/app.js"></script>
</body>
</html>
