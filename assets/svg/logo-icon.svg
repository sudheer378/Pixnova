<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" role="img" aria-label="Pixaroid icon">
  <defs>
    <!-- Spectrum gradient mesh -->
    <linearGradient id="g-red-orange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF3CAC"/>
      <stop offset="100%" stop-color="#FF6B35"/>
    </linearGradient>
    <linearGradient id="g-purple-blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7B2FFF"/>
      <stop offset="100%" stop-color="#2F80ED"/>
    </linearGradient>
    <linearGradient id="g-cyan-green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00D2FF"/>
      <stop offset="100%" stop-color="#00C853"/>
    </linearGradient>
    <linearGradient id="g-amber-pink" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFB800"/>
      <stop offset="100%" stop-color="#FF3CAC"/>
    </linearGradient>
    <linearGradient id="g-core" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7B2FFF"/>
      <stop offset="50%" stop-color="#FF3CAC"/>
      <stop offset="100%" stop-color="#FF6B35"/>
    </linearGradient>
    <!-- Glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-soft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background: dark rounded square -->
  <rect width="48" height="48" rx="11" fill="#0A0812"/>

  <!-- Subtle background glow -->
  <ellipse cx="24" cy="24" rx="18" ry="18" fill="none" filter="url(#glow-soft)"/>

  <!-- Pixel grid mark — 4 quadrant pixels, each a different spectrum color -->
  <!-- Top-left: pink-red -->
  <rect x="7" y="7" width="14" height="14" rx="3" fill="url(#g-red-orange)" filter="url(#glow)" opacity="0.95"/>
  <!-- Top-right: purple-blue -->
  <rect x="27" y="7" width="14" height="14" rx="3" fill="url(#g-purple-blue)" filter="url(#glow)" opacity="0.95"/>
  <!-- Bottom-left: cyan-green -->
  <rect x="7" y="27" width="14" height="14" rx="3" fill="url(#g-cyan-green)" filter="url(#glow)" opacity="0.95"/>
  <!-- Bottom-right: amber-pink -->
  <rect x="27" y="27" width="14" height="14" rx="3" fill="url(#g-amber-pink)" filter="url(#glow)" opacity="0.95"/>

  <!-- Center cross-pixel: spectrum bridge, slightly overlapping -->
  <rect x="19" y="19" width="10" height="10" rx="2.5" fill="url(#g-core)" opacity="0.9" filter="url(#glow)"/>

  <!-- Corner pixel accents (tiny, bright) -->
  <rect x="7" y="7" width="4" height="4" rx="1" fill="white" opacity="0.4"/>
  <rect x="37" y="7" width="4" height="4" rx="1" fill="white" opacity="0.2"/>
  <rect x="7" y="37" width="4" height="4" rx="1" fill="white" opacity="0.2"/>
  <rect x="37" y="37" width="4" height="4" rx="1" fill="white" opacity="0.15"/>
</svg>
