<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Pixaroid">
  <defs>
    <!-- Primary gradient: violet to cyan -->
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="50%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <!-- Accent gradient for glow elements -->
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#38BDF8"/>
    </linearGradient>
    <!-- Dark background gradient -->
    <linearGradient id="g3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F0B1E"/>
      <stop offset="100%" stop-color="#0D1B2A"/>
    </linearGradient>
    <!-- Inner glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="softglow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="1 0 0 0 0.55  0 0 0.8 0 0.37  0 0 1 0 0.95  0 0 0 0.6 0" result="colorBlur"/>
      <feMerge><feMergeNode in="colorBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="roundClip">
      <rect width="64" height="64" rx="16"/>
    </clipPath>
  </defs>

  <!-- Background: rich dark with subtle gradient -->
  <rect width="64" height="64" rx="16" fill="url(#g3)"/>
  <!-- Subtle background grid pattern -->
  <rect width="64" height="64" rx="16" fill="none" stroke="#1E1040" stroke-width="0.5" opacity="0.6"/>

  <!-- Background glow orb -->
  <ellipse cx="32" cy="30" rx="22" ry="20" fill="url(#g1)" opacity="0.08"/>

  <!-- ── MAIN ICON: Pixel aperture / P shape ── -->
  <g clip-path="url(#roundClip)">

    <!-- Outer ring segments — aperture blades -->
    <!-- Top-left blade -->
    <path d="M20 12 L32 18 L26 22 Z" fill="url(#g1)" opacity="0.7"/>
    <!-- Top-right blade -->
    <path d="M44 12 L32 18 L38 22 Z" fill="url(#g2)" opacity="0.5"/>
    <!-- Right blade -->
    <path d="M52 28 L38 22 L40 32 Z" fill="url(#g1)" opacity="0.6"/>
    <!-- Bottom-right blade -->
    <path d="M46 48 L40 32 L36 40 Z" fill="url(#g2)" opacity="0.45"/>
    <!-- Bottom blade -->
    <path d="M32 52 L36 40 L28 40 Z" fill="url(#g1)" opacity="0.5"/>
    <!-- Bottom-left blade -->
    <path d="M18 48 L28 40 L24 32 Z" fill="url(#g2)" opacity="0.55"/>
    <!-- Left blade -->
    <path d="M12 28 L24 32 L26 22 Z" fill="url(#g1)" opacity="0.65"/>

    <!-- Center hexagonal core -->
    <polygon points="26,22 38,22 40,32 36,40 28,40 24,32"
      fill="url(#g1)" opacity="0.25"/>

    <!-- ── THE P LETTERFORM — built from geometric segments ── -->
    <!-- Vertical stroke of P -->
    <rect x="22" y="18" width="6" height="28" rx="2"
      fill="url(#g1)" filter="url(#softglow)"/>

    <!-- Top horizontal of P -->
    <rect x="22" y="18" width="14" height="5.5" rx="2.5"
      fill="url(#g2)" filter="url(#softglow)"/>

    <!-- Middle horizontal of P -->
    <rect x="22" y="29.5" width="14" height="5.5" rx="2.5"
      fill="url(#g2)" filter="url(#softglow)"/>

    <!-- Right curve of P (vertical connector) -->
    <rect x="33" y="18" width="5.5" height="17" rx="2.5"
      fill="url(#g1)" filter="url(#softglow)"/>

    <!-- ── Pixel accent dots — circuit/tech feel ── -->
    <!-- Top-right corner accent -->
    <circle cx="48" cy="16" r="2.5" fill="#38BDF8" opacity="0.7" filter="url(#glow)"/>
    <circle cx="48" cy="16" r="1.2" fill="#fff" opacity="0.9"/>

    <!-- Bottom-left corner accent -->
    <circle cx="16" cy="48" r="2" fill="#A78BFA" opacity="0.7" filter="url(#glow)"/>
    <circle cx="16" cy="48" r="1" fill="#fff" opacity="0.9"/>

    <!-- Small pixel cluster — bottom right -->
    <rect x="44" y="44" width="4" height="4" rx="1" fill="#06B6D4" opacity="0.5"/>
    <rect x="49" y="44" width="3" height="3" rx="1" fill="#8B5CF6" opacity="0.4"/>
    <rect x="44" y="49" width="3" height="3" rx="1" fill="#8B5CF6" opacity="0.4"/>

    <!-- Highlight stripe on P -->
    <rect x="22" y="18" width="3" height="28" rx="1.5"
      fill="white" opacity="0.12"/>
  </g>

  <!-- Outer border glow -->
  <rect width="64" height="64" rx="16" fill="none"
    stroke="url(#g2)" stroke-width="1.5" opacity="0.35"/>
  <!-- Inner border -->
  <rect x="1" y="1" width="62" height="62" rx="15" fill="none"
    stroke="white" stroke-width="0.5" opacity="0.08"/>
</svg>
