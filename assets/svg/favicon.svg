<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="f1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <linearGradient id="f2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#38BDF8"/>
    </linearGradient>
    <linearGradient id="f3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F0B1E"/>
      <stop offset="100%" stop-color="#0D1524"/>
    </linearGradient>
    <filter id="fg">
      <feGaussianBlur stdDeviation="0.8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="frc"><rect width="32" height="32" rx="8"/></clipPath>
  </defs>

  <!-- Background -->
  <rect width="32" height="32" rx="8" fill="url(#f3)"/>

  <g clip-path="url(#frc)">
    <!-- Subtle glow -->
    <ellipse cx="16" cy="15" rx="12" ry="10" fill="url(#f1)" opacity="0.12"/>

    <!-- Aperture blades -->
    <path d="M7 4 L12 7 L9.5 8.5 Z" fill="url(#f1)" opacity="0.6"/>
    <path d="M17 4 L12 7 L14.5 8.5 Z" fill="url(#f2)" opacity="0.5"/>
    <path d="M20 12 L14.5 8.5 L15.5 12 Z" fill="url(#f1)" opacity="0.55"/>
    <path d="M17.5 20 L15.5 12 L13.5 15 Z" fill="url(#f2)" opacity="0.45"/>
    <path d="M12 22 L13.5 15 L10.5 15 Z" fill="url(#f1)" opacity="0.5"/>
    <path d="M6.5 20 L10.5 15 L8.5 12 Z" fill="url(#f2)" opacity="0.5"/>
    <path d="M4 12 L8.5 12 L9.5 8.5 Z" fill="url(#f1)" opacity="0.55"/>

    <!-- P letterform — crisp at 32px -->
    <rect x="7.5" y="6.5" width="3" height="19" rx="1.2" fill="url(#f1)"/>
    <rect x="7.5" y="6.5" width="8" height="3.5" rx="1.5" fill="url(#f2)"/>
    <rect x="7.5" y="13.5" width="8" height="3.5" rx="1.5" fill="url(#f2)"/>
    <rect x="13" y="6.5" width="3" height="10.5" rx="1.5" fill="url(#f1)"/>

    <!-- Accent dot -->
    <circle cx="24" cy="8" r="2" fill="#38BDF8" opacity="0.8" filter="url(#fg)"/>
    <circle cx="24" cy="8" r="1" fill="white" opacity="0.95"/>

    <!-- Bottom-right pixel cluster -->
    <rect x="22" y="22" width="3" height="3" rx="0.8" fill="#06B6D4" opacity="0.6"/>
    <rect x="26" y="22" width="2" height="2" rx="0.6" fill="#8B5CF6" opacity="0.45"/>
    <rect x="22" y="26" width="2" height="2" rx="0.6" fill="#8B5CF6" opacity="0.45"/>

    <!-- Highlight edge on P -->
    <rect x="7.5" y="6.5" width="1.5" height="19" rx="0.7" fill="white" opacity="0.14"/>
  </g>

  <!-- Border glow -->
  <rect width="32" height="32" rx="8" fill="none" stroke="url(#f2)" stroke-width="1" opacity="0.4"/>
</svg>
