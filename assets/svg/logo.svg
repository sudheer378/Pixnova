<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 48" role="img" aria-label="Pixaroid">
  <defs>
    <linearGradient id="lg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="50%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <linearGradient id="lg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#38BDF8"/>
    </linearGradient>
    <linearGradient id="lg3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C4B5FD"/>
      <stop offset="55%" stop-color="#818CF8"/>
      <stop offset="100%" stop-color="#22D3EE"/>
    </linearGradient>
    <linearGradient id="lg4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F0B1E"/>
      <stop offset="100%" stop-color="#0D1B2A"/>
    </linearGradient>
    <filter id="gw">
      <feGaussianBlur stdDeviation="1.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="rc"><rect width="48" height="48" rx="13"/></clipPath>
  </defs>

  <!-- ── ICON MARK (48×48) ── -->
  <rect width="48" height="48" rx="13" fill="url(#lg4)"/>
  <ellipse cx="24" cy="23" rx="18" ry="16" fill="url(#lg1)" opacity="0.1"/>

  <g clip-path="url(#rc)">
    <!-- Aperture blades -->
    <path d="M14 8 L24 13 L19 16.5 Z" fill="url(#lg1)" opacity="0.65"/>
    <path d="M34 8 L24 13 L29 16.5 Z" fill="url(#lg2)" opacity="0.5"/>
    <path d="M40 22 L29 16.5 L31 24 Z" fill="url(#lg1)" opacity="0.55"/>
    <path d="M35 38 L31 24 L27 30 Z" fill="url(#lg2)" opacity="0.45"/>
    <path d="M24 41 L27 30 L21 30 Z" fill="url(#lg1)" opacity="0.5"/>
    <path d="M13 38 L21 30 L17 24 Z" fill="url(#lg2)" opacity="0.5"/>
    <path d="M8 22 L17 24 L19 16.5 Z" fill="url(#lg1)" opacity="0.6"/>
    <!-- Hexagonal core -->
    <polygon points="19,16.5 29,16.5 31,24 27,30 21,30 17,24" fill="url(#lg1)" opacity="0.2"/>

    <!-- P letterform -->
    <rect x="15.5" y="13" width="5" height="22" rx="1.8" fill="url(#lg1)" filter="url(#gw)"/>
    <rect x="15.5" y="13" width="12" height="4.5" rx="2" fill="url(#lg2)" filter="url(#gw)"/>
    <rect x="15.5" y="22.5" width="12" height="4.5" rx="2" fill="url(#lg2)" filter="url(#gw)"/>
    <rect x="25" y="13" width="4.5" height="14" rx="2" fill="url(#lg1)" filter="url(#gw)"/>

    <!-- Tech accent dots -->
    <circle cx="37" cy="11" r="2" fill="#38BDF8" opacity="0.75" filter="url(#gw)"/>
    <circle cx="37" cy="11" r="1" fill="#fff" opacity="0.95"/>
    <circle cx="11" cy="37" r="1.6" fill="#A78BFA" opacity="0.7" filter="url(#gw)"/>
    <rect x="33" y="33" width="3.5" height="3.5" rx="1" fill="#06B6D4" opacity="0.5"/>
    <rect x="37.5" y="33" width="2.5" height="2.5" rx="0.8" fill="#8B5CF6" opacity="0.4"/>
    <rect x="33" y="37.5" width="2.5" height="2.5" rx="0.8" fill="#8B5CF6" opacity="0.4"/>

    <!-- Highlight -->
    <rect x="15.5" y="13" width="2.5" height="22" rx="1.2" fill="white" opacity="0.12"/>
  </g>

  <!-- Icon border glow -->
  <rect width="48" height="48" rx="13" fill="none" stroke="url(#lg2)" stroke-width="1.2" opacity="0.4"/>
  <rect x="0.8" y="0.8" width="46.4" height="46.4" rx="12.2" fill="none" stroke="white" stroke-width="0.5" opacity="0.07"/>

  <!-- ── WORDMARK ── -->
  <text
    x="60" y="32"
    font-family="'Sora', 'Space Grotesk', 'DM Sans', system-ui, sans-serif"
    font-size="22"
    font-weight="800"
    letter-spacing="-0.7"
    fill="url(#lg3)">Pixaroid</text>
</svg>
