<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 56" role="img" aria-label="Pixaroid">
  <defs>
    <!-- Icon gradients -->
    <linearGradient id="l-a" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF3CAC"/>
      <stop offset="100%" stop-color="#FF6B35"/>
    </linearGradient>
    <linearGradient id="l-b" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7B2FFF"/>
      <stop offset="100%" stop-color="#2F80ED"/>
    </linearGradient>
    <linearGradient id="l-c" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00D2FF"/>
      <stop offset="100%" stop-color="#00C853"/>
    </linearGradient>
    <linearGradient id="l-d" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFB800"/>
      <stop offset="100%" stop-color="#FF3CAC"/>
    </linearGradient>
    <linearGradient id="l-core" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7B2FFF"/>
      <stop offset="50%" stop-color="#FF3CAC"/>
      <stop offset="100%" stop-color="#FF6B35"/>
    </linearGradient>
    <!-- Wordmark gradient -->
    <linearGradient id="l-word" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E2D9FF"/>
    </linearGradient>
    <!-- Tagline colour -->
    <linearGradient id="l-tag" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#FF3CAC"/>
      <stop offset="50%"  stop-color="#7B2FFF"/>
      <stop offset="100%" stop-color="#00D2FF"/>
    </linearGradient>
    <filter id="icon-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Icon mark background -->
  <rect x="2" y="4" width="48" height="48" rx="11" fill="#0A0812"/>

  <!-- Icon pixel quadrants -->
  <rect x="8"  y="10" width="15" height="15" rx="3.5" fill="url(#l-a)" filter="url(#icon-glow)"/>
  <rect x="29" y="10" width="15" height="15" rx="3.5" fill="url(#l-b)" filter="url(#icon-glow)"/>
  <rect x="8"  y="31" width="15" height="15" rx="3.5" fill="url(#l-c)" filter="url(#icon-glow)"/>
  <rect x="29" y="31" width="15" height="15" rx="3.5" fill="url(#l-d)" filter="url(#icon-glow)"/>
  <!-- Centre pixel -->
  <rect x="21" y="22" width="10" height="10" rx="2.5" fill="url(#l-core)"/>

  <!-- Wordmark "Pixaroid" -->
  <text
    x="66" y="33"
    font-family="'Sora','Space Grotesk','DM Sans',system-ui,sans-serif"
    font-weight="800"
    font-size="24"
    letter-spacing="-0.8"
    fill="url(#l-word)">Pixaroid</text>

  <!-- Tagline -->
  <text
    x="67" y="47"
    font-family="'DM Sans','Nunito Sans',system-ui,sans-serif"
    font-weight="500"
    font-size="10.5"
    letter-spacing="0.3"
    fill="url(#l-tag)">Every pixel, perfected.</text>
</svg>
