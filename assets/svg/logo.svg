<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 40" fill="none" role="img" aria-label="Pixnova">
  <defs>
    <linearGradient id="logoGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <linearGradient id="markGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="50%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
  </defs>
  <!-- Mark: stylised P + pixel grid -->
  <rect x="2" y="8" width="10" height="10" rx="2" fill="url(#markGrad)" opacity="0.9"/>
  <rect x="14" y="8" width="10" height="10" rx="2" fill="url(#markGrad)" opacity="0.65"/>
  <rect x="2" y="20" width="10" height="10" rx="2" fill="url(#markGrad)" opacity="0.65"/>
  <rect x="14" y="20" width="10" height="10" rx="2" fill="url(#markGrad)" opacity="0.4"/>
  <!-- Wordmark -->
  <text x="32" y="28" font-family="Poppins, sans-serif" font-weight="700" font-size="20" fill="url(#logoGrad)">Pixaroid</text>
</svg>
